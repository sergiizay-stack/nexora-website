      .nx-sphere { fill: currentColor; }
      .nx-spin {
        transform-origin: 231px 55px;
        animation: nx-spin 14s linear infinite;
      }
      @keyframes nx-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
